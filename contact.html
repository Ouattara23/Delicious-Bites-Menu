<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <header></header>

    <main>
        <form>
            <label>Nom</label>
            <input type="text" placeholder="Entrez votre nom">

            <h3>Choix des plats</h3>
            <Label>Entées</Label>
            <select>
                <option value="1">Salade Capress</option>
                <option value="2">Salade de crevettes tropicale</option>
                <option value="3">Salade César au poulet</option>
            </select>

            <!--Plats principaux-->
            <Label>Plat principal</Label>
            <select>
                <option value="1">Saumon grillé</option>
                <option value="2">Poulet braisé accompagné d’alloco</option>
                <option value="3">Pâtes crémeuses aux crevettes</option>
            </select>

            <!--Désserts-->
            <Label>Désserts</Label>
            <select>
                <option value="1">Fondue au chocolat</option>
                <option value="2">Tarte aux fraises</option>
                <option value="3">Coupe glacée vanille-caramel</option>
            </select>

            <input type="submit" value="Commander">
        </form>
    </main>

    <footer></footer>
</body>
</html>
